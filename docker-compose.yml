services:
  mysql:
    image: mysql:8.4
    container_name: favouritebooks-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: favourite_books_db
      MYSQL_USER: favourite_user
      MYSQL_PASSWORD: favourite_pass123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: favouritebooks-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: favourite_user
      DB_PASSWORD: favourite_pass123
      DB_NAME: favourite_books_db
      JWT_SECRET: bookstore_secret_key
    ports:
      - "5001:5000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  mysql_data:
  backend_uploads:
